<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Preferences | Beyond Peps</title>
    <link rel="icon" type="image/png" href="/assets/bp-logo-mark.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="section page-section">
      <section class="glass-panel account-card unsubscribe-card">
        <span class="brand-mark"><img src="/assets/bp-logo-mark.png" alt=""></span>
        <p class="eyebrow">Email preferences</p>
        <h1>Marketing unsubscribe</h1>
        <p id="unsubscribeStatus">Updating your email preferences...</p>
        <p>Order confirmations, shipping notices, and account-required messages are not affected.</p>
        <a class="button ghost" href="index.html">Return to Beyond Peps</a>
      </section>
    </main>
    <script>
      (async function () {
        const status = document.querySelector("#unsubscribeStatus");
        const token = new URLSearchParams(window.location.search).get("token");
        if (!token) {
          status.textContent = "This unsubscribe link is invalid.";
          return;
        }
        try {
          const response = await fetch(`/api/unsubscribe?token=${encodeURIComponent(token)}`);
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Unable to unsubscribe.");
          status.textContent = data.message;
        } catch (error) {
          status.textContent = error.message;
        }
      })();
    </script>
  </body>
</html>
